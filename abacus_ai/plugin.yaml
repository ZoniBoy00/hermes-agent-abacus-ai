name: abacus_ai
version: 2.0.0
description: "Abacus AI image generation backend via RouteLLM (FLUX 2 Pro, DALL-E, MidJourney, Nano Banana Pro 4K, and 20+ models)."
author: ZoniBoy00
kind: backend
requires_env:
